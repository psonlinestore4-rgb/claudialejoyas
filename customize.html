<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier 3D | Claudiale Joyas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS EXCLUSIVOS PARA LA BOUTIQUE 3D --- */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            overflow: hidden;
            margin: 0;
        }

        /* Navbar adaptado */
        .navbar-container {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 0 6vw; max-width: 1800px; margin: 0 auto;
        }
        .navbar-side { flex: 1; display: flex; align-items: center; }
        .navbar-left { justify-content: flex-start; gap: 40px; }
        .navbar-center { flex: 1; display: flex; justify-content: center; }
        .navbar-right { justify-content: flex-end; gap: 40px; }

        /* REFACTORIZACIÓN PANEL ESTILO RICHTER PHILLIPS */
        .panel-configurador-apple {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 450px; /* Un poco más ancho para el layout de pasos */
            height: 70vh;
            display: flex; /* Layout dividido */
            position: absolute;
            right: 6vw;
            top: 55%;
            transform: translateY(-50%);
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        /* Sidebar de Pasos (Izquierda) */
        .config-sidebar {
            width: 80px;
            background: rgba(0,0,0,0.2);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 20px;
        }

        .step-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            opacity: 0.4;
        }

        .step-icon:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .step-icon.active { 
            opacity: 1; 
            background: rgba(212, 175, 55, 0.1); 
            border-color: rgba(212, 175, 55, 0.5); 
        }

        .step-icon svg { width: 24px; height: 24px; fill: #fff; }

        /* Contenido Principal (Derecha) */
        .config-main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .titulo-atelier {
            color: var(--color-dorado);
            font-family: 'Montserrat';
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .seccion-paso { display: none; }
        .seccion-paso.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid Visual de Opciones (Icono + Texto) */
        .grid-visual {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .opt-visual-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .opt-visual-btn:hover { background: rgba(255,255,255,0.08); }
        .opt-visual-btn.active { border-color: #D4AF37; background: rgba(212, 175, 55, 0.05); }

        .opt-visual-btn img { width: 35px; height: 35px; margin-bottom: 10px; filter: invert(1); }
        .opt-visual-btn span { display: block; color: #fff; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Precios y Botón */
        .footer-config { margin-top: auto; padding-top: 30px; }
        #precio-actual {
            font-family: 'Cormorant Garamond';
            color: #fff;
            font-size: 2.5rem;
            margin: 5px 0 20px 0;
            font-weight: 300;
        }

        .btn-apple-comprar {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Montserrat';
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .btn-apple-comprar:hover { background: #D4AF37; color: #fff; transform: translateY(-2px); }

        /* Overlay de Carga */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 999; color: #D4AF37; font-family: 'Montserrat'; letter-spacing: 5px; font-size: 12px;
            animation: fadeOut 2s ease forwards 1.5s;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
    <div class="loading-overlay">INICIALIZANDO ATELIER 3D...</div>

    <div id="cursor-custom"></div>
    <div id="cursor-dot"></div>

    <nav id="navbar" class="navbar scrolled" style="background: rgba(10,10,10,0.8); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="navbar-container">
            <div class="navbar-side navbar-left">
                <ul class="navbar-menu" style="margin:0; padding:0;">
                    <li><a href="index.html" class="menu-link"><span class="menu-link-inner"><span class="menu-link-text">Inicio</span><span class="menu-link-text">Inicio</span></span></a></li>
                    <li><a href="aboutus.html" class="menu-link"><span class="menu-link-inner"><span class="menu-link-text">Nosotros</span><span class="menu-link-text">Nosotros</span></span></a></li>
                </ul>
            </div>
            <div class="navbar-center">
                <a href="index.html" class="navbar-logo" style="margin:0; font-size: 2.2rem;">CLAUDIALE</a>
            </div>
            <div class="navbar-side navbar-right">
                <a href="#" class="menu-link"><span class="menu-link-inner"><span class="menu-link-text">CARRITO (0)</span><span class="menu-link-text">CARRITO (0)</span></span></a>
            </div>
        </div>
    </nav>

    <div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;"></div>

    <main id="contenedor-scroll" style="height: 100vh; position: relative; z-index: 10; pointer-events: none;">
        <section class="espacio configurador" style="width: 100%; height: 100%; position: relative;">
            
            <aside class="panel-configurador-apple" id="panel-configurador" style="pointer-events: auto;">
                
                <div class="config-sidebar">
                    <div class="step-icon active" data-step="1" title="Piedra">
                        <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                    </div>
                    <div class="step-icon" data-step="2" title="Metal">
                        <svg viewBox="0 0 24 24"><path d="M12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22Z"/></svg>
                    </div>
                </div>

                <div class="config-main-content">
                    <p class="titulo-atelier">Customizer</p>
                    <h2 style="font-family: 'Cormorant Garamond'; color: #fff; font-size: 2rem; margin-bottom: 25px; font-weight: 300;">Anillo Leyenda</h2>

                    <div class="seccion-paso active" id="paso-1">
                        <h3 style="color:#fff; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">Forma de la Piedra</h3>
                        <div class="grid-visual">
                            <div class="opt-visual-btn active" data-value="round">
                                <img src="assets/icons/round.svg" alt="Round">
                                <span>Brillante</span>
                            </div>
                            <div class="opt-visual-btn" data-value="marquise">
                                <img src="assets/icons/marquise.svg" alt="Marquise">
                                <span>Marquise</span>
                            </div>
                            <div class="opt-visual-btn" data-value="pear">
                                <img src="assets/icons/pear.svg" alt="Pear">
                                <span>Pera</span>
                            </div>
                            <div class="opt-visual-btn" data-value="emerald">
                                <img src="assets/icons/emerald.svg" alt="Emerald">
                                <span>Esmeralda</span>
                            </div>
                        </div>
                    </div>

                    <div class="seccion-paso" id="paso-2">
                        <h3 style="color:#fff; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">Metal de la Banda</h3>
                        <div class="grid-visual">
                            <div class="opt-visual-btn" data-value="yellow-gold">
                                <div style="width:20px; height:20px; background:#D4AF37; border-radius:50%; margin: 0 auto 10px auto;"></div>
                                <span>Oro Amarillo</span>
                            </div>
                            <div class="opt-visual-btn" data-value="platinum">
                                <div style="width:20px; height:20px; background:#E5E4E2; border-radius:50%; margin: 0 auto 10px auto;"></div>
                                <span>Platino</span>
                            </div>
                        </div>
                    </div>

                    <div class="footer-config">
                        <p style="color:rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin:0;">Total estimado</p>
                        <h2 id="precio-actual">$1,250.00</h2>
                        <button class="btn-apple-comprar" id="btn-anadir-carrito">AÑADIR A LA BOLSA</button>
                    </div>
                </div>

            </aside>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
    
    <script>
        /* LÓGICA DE INTERFAZ PASO A PASO */
        document.querySelectorAll('.step-icon').forEach(icon => {
            icon.addEventListener('click', () => {
                document.querySelectorAll('.step-icon, .seccion-paso').forEach(el => el.classList.remove('active'));
                icon.classList.add('active');
                document.getElementById('paso-' + icon.dataset.step).classList.add('active');
            });
        });

        /* LÓGICA DE CURSOR PERSONALIZADO */
        const cursor = document.getElementById('cursor-custom');
        const dot = document.getElementById('cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
            setTimeout(() => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; }, 40);
        });

        // Hover interactivo
        const updateHovers = () => {
            document.querySelectorAll('a, button, .opt-visual-btn, .step-icon').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
                el.style.cursor = 'none';
            });
        };
        setTimeout(updateHovers, 1000);
    </script>
</body>
</html>
