<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Claudia Le Joyas</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background: #111; color: #eee; font-family: 'Montserrat', sans-serif; padding: 2rem; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .admin-login { background: #222; padding: 2rem; border-radius: 4px; max-width: 400px; margin: 5rem auto; }
        .admin-login input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #333; border: 1px solid #444; color: white; }
        .admin-login button { width: 100%; padding: 0.8rem; background: var(--color-teja); color: white; border: none; cursor: pointer; }
        .admin-section { background: #1a1a1a; padding: 1.5rem; margin-bottom: 2rem; border-radius: 4px; }
        .admin-section h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #333; }
        .estado-pendiente { color: #f39c12; }
        .estado-contactado { color: #27ae60; }
        .btn-logout { background: #964e3e; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-view" class="admin-login">
        <h2>Acceso Administrador</h2>
        <input type="email" id="email" placeholder="Email" value="claudia@claudialejoyas.com">
        <button onclick="sendMagicLink()">Enviar enlace mágico</button>
        <p id="login-message" style="color: #d4af37; margin-top: 1rem;"></p>
    </div>

    <div id="dashboard-view" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <h1>Bienvenida, Claudia</h1>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>

            <div class="admin-section">
                <h3>Consultas recientes</h3>
                <table id="inquiries-table">
                    <thead>
                        <tr><th>Fecha</th><th>Nombre</th><th>Email</th><th>Interés</th><th>Estado</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="admin-section">
                <h3>Metales (editar material_config)</h3>
                <!-- Aquí podrías tener un editor JSON -->
                <p>Próximamente: editor de materiales.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js';

        const supabaseUrl = 'https://tu-proyecto.supabase.co';
        const supabaseAnonKey = 'tu-anon-key';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        window.sendMagicLink = async () => {
            const email = document.getElementById('email').value;
            const { error } = await supabase.auth.signInWithOtp({ email });
            if (error) {
                document.getElementById('login-message').innerText = 'Error: ' + error.message;
            } else {
                document.getElementById('login-message').innerText = '¡Revisa tu correo!';
            }
        };

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';
                loadInquiries();
                // Suscribirse a nuevas consultas en tiempo real
                supabase
                    .channel('inquiries-channel')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'inquiries' }, payload => {
                        addInquiryRow(payload.new);
                    })
                    .subscribe();
            }
        }

        async function loadInquiries() {
            const { data } = await supabase.from('inquiries').select('*').order('created_at', { ascending: false });
            const tbody = document.querySelector('#inquiries-table tbody');
            tbody.innerHTML = '';
            data.forEach(addInquiryRow);
        }

        function addInquiryRow(inq) {
            const tbody = document.querySelector('#inquiries-table tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${new Date(inq.created_at).toLocaleDateString()}</td>
                <td>${inq.name}</td>
                <td>${inq.email}</td>
                <td>${inq.interest_type}</td>
                <td class="estado-${inq.status || 'pendiente'}">${inq.status || 'pendiente'}</td>
            `;
            tbody.appendChild(row);
        }

        window.logout = async () => {
            await supabase.auth.signOut();
            location.reload();
        };

        checkUser();
    </script>
</body>
</html>
